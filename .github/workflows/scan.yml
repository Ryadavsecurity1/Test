name: Docker Image Vulnerability Scan

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'  # Runs every Monday at 8am UTC
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  scan:
    name: Scan Docker Image with Trivy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Pull the Docker image from Docker Hub ──────────────────────────
      - name: Pull Docker image
        run: docker pull pcornetqf/qf-r-base:latest

      # ── 3. Generate HTML report ───────────────────────────────────────────
      - name: Run Trivy scanner (HTML output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'pcornetqf/qf-r-base:latest'
          format: 'template'
          template: '@/contrib/html.tpl'
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          output: 'trivy-report.html'

      # ── 4. Install Chromium for PDF conversion ────────────────────────────
      - name: Install Chromium
        run: |
          sudo apt-get update -y
          sudo apt-get install -y chromium-browser

      # ── 5. Convert HTML → PDF ─────────────────────────────────────────────
      - name: Convert HTML report to PDF
        run: |
          chromium-browser \
            --headless \
            --no-sandbox \
            --disable-gpu \
            --print-to-pdf="trivy-report.pdf" \
            --print-to-pdf-no-header \
            "$(pwd)/trivy-report.html"

      # ── 6. Print summary to job log ───────────────────────────────────────
      - name: Run Trivy scanner (table log output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'pcornetqf/qf-r-base:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      # ── 7. Upload HTML artifact ───────────────────────────────────────────
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-html
          path: trivy-report.html
          retention-days: 30

      # ── 8. Upload PDF artifact ────────────────────────────────────────────
      - name: Upload PDF report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-pdf
          path: trivy-report.pdf
          retention-days: 30
